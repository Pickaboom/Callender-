    function saveJSON(key, value) { localStorage.setItem(key, JSON.stringify(value)); }
    function loadJSON(key, fallback) {
        try {
            const raw = localStorage.getItem(key);
            return raw ? JSON.parse(raw) : fallback;
        } catch {
            return fallback;
        }
    }

    let usersMap = new Map();

    let avail = loadJSON(KEY_AVAIL, []);
    let hostPicks = loadJSON(KEY_PICKS, []);
    let viewMode = loadJSON(KEY_VIEWMODE, false);

    let viewDate = new Date();
    let selectedDate = null;
    let pendingOpenDate = null;
    let authMode = "login";
    let profileImageData = null;
    let unsubscribers = [];

    function uid() { return Math.random().toString(16).slice(2) + Date.now().toString(16); }
    function pad2(n) { return String(n).padStart(2, "0"); }
    function toISODate(d) { return d.getFullYear() + "-" + pad2(d.getMonth() + 1) + "-" + pad2(d.getDate()); }
    function fromISODate(s) { const p = s.split("-").map(Number); return new Date(p[0], p[1] - 1, p[2]); }
    function startOfMonth(d) { return new Date(d.getFullYear(), d.getMonth(), 1); }
    function monthLabel(d) { return d.toLocaleString(undefined, { month: "long", year: "numeric" }); }
    function mondayIndex(jsDay) { return (jsDay + 6) % 7; }
    function prettyDate(iso) {
        const d = fromISODate(iso);
        return d.toLocaleDateString(undefined, { weekday: "long", year: "numeric", month: "long", day: "numeric" });
    }

    function escapeHTML(s) {
        return String(s).replace(/[&<>"']/g, c => ({
            "&": "&amp;",
            "<": "&lt;",
            ">": "&gt;",
            '"': "&quot;",
            "'": "&#39;"
        }[c]));
    }

    function toast(msg) {
        const t = document.getElementById("toast");
        t.textContent = msg;
        t.style.display = "block";
        clearTimeout(toast._tm);
        toast._tm = setTimeout(() => t.style.display = "none", 2600);
    }

    function initialsFromName(name) {
        const clean = String(name || "").trim();
        if (!clean) return "U";
        const parts = clean.split(/\s+/).slice(0, 2);
        return parts.map(p => p[0]?.toUpperCase() || "").join("") || "U";
    }

    function defaultAvatarDataURL(name) {
        const initials = initialsFromName(name);
        const svg = `
            <svg xmlns="http://www.w3.org/2000/svg" width="160" height="160" viewBox="0 0 160 160">
                <defs>
                    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
                        <stop stop-color="#7289da"/>
                        <stop offset="1" stop-color="#39d98a"/>
                    </linearGradient>
                </defs>
                <rect width="160" height="160" rx="34" fill="url(#g)"/>
                <text x="80" y="95" text-anchor="middle" font-family="Arial, sans-serif" font-size="54" font-weight="700" fill="white">${initials}</text>
            </svg>
        `;
        return "data:image/svg+xml;charset=utf-8," + encodeURIComponent(svg);
    }

    async function fileToAvatarDataURL(file) {
        const img = await new Promise((resolve, reject) => {
            const fr = new FileReader();
            fr.onload = () => {
                const image = new Image();
                image.onload = () => resolve(image);
                image.onerror = reject;
                image.src = fr.result;
            };
            fr.onerror = reject;
            fr.readAsDataURL(file);
        });

        const size = 180;
        const canvas = document.createElement("canvas");
        canvas.width = size;
        canvas.height = size;
        const ctx = canvas.getContext("2d");

        const sw = img.width;
        const sh = img.height;
        const side = Math.min(sw, sh);
        const sx = (sw - side) / 2;
        const sy = (sh - side) / 2;

        ctx.drawImage(img, sx, sy, side, side, 0, 0, size, size);
        return canvas.toDataURL("image/jpeg", 0.82);
    }

    function profilePhotoOrDefault(userLike) {
        return userLike?.photoURL || defaultAvatarDataURL(userLike?.name || userLike?.displayName || userLike?.email || "User");
    }

    async function ensureUserDoc(firebaseUser) {
        const ref = doc(db, "users", firebaseUser.uid);
        const snap = await getDoc(ref);

        if (!snap.exists()) {
            const fallbackName = (firebaseUser.email || "User").split("@")[0];
            await setDoc(ref, {
                name: fallbackName,
                email: firebaseUser.email || "",
                role: "staff",
                photoURL: "",
                createdAt: Date.now()
            }, { merge: true });
        }
    }

    async function loadSessionFromAuth(firebaseUser) {
        if (!firebaseUser) {
            session = null;
            return;
        }

        await ensureUserDoc(firebaseUser);

        const snap = await getDoc(doc(db, "users", firebaseUser.uid));
        const data = snap.exists() ? snap.data() : {};

        session = {
            uid: firebaseUser.uid,
            email: firebaseUser.email || "",
            name: data.name || (firebaseUser.email || "User").split("@")[0],
            role: data.role || "staff",
            photoURL: data.photoURL || ""
        };
    }

    function canClickHost(host) {
        if (!session) return false;
        if (session.role === "admin") return true;
        return host.uid === session.uid;
    }

    async function upsertEvent(ev) {
        await setDoc(doc(db, "events", ev.id), ev, { merge: true });
    }

    async function removeEvent(id) {
        await deleteDoc(doc(db, "events", id));
    }

    async function upsertAvail(a) {
        await setDoc(doc(db, "availability", a.id), a, { merge: true });
    }

    async function removeAvail(id) {
        await deleteDoc(doc(db, "availability", id));
    }

    function pickDocId(dateIso, hostUid) {
        return `${dateIso}_${hostUid}`;
    }

    async function setPick(dateIso, host) {
        const id = pickDocId(dateIso, host.uid);
        await setDoc(doc(db, "host_picks", id), {
            id,
            date: dateIso,
            hostUid: host.uid,
            hostName: host.name,
            hostImg: profilePhotoOrDefault(host)
        }, { merge: true });
    }

    async function removePick(dateIso, hostUid) {
        await deleteDoc(doc(db, "host_picks", pickDocId(dateIso, hostUid)));
    }

    async function clearPicksForDate(dateIso) {
        const picks = hostPicks.filter(p => p.date === dateIso);
        await Promise.all(picks.map(p => removePick(dateIso, p.hostUid)));
    }

    function picksForDate(dateIso) {
        return hostPicks.filter(p => p.date === dateIso);
    }

    function isPicked(dateIso, hostUid) {
        return hostPicks.some(p => p.date === dateIso && p.hostUid === hostUid);
    }

    const calGrid = document.getElementById("calGrid");
    const monthTitle = document.getElementById("monthTitle");
    const selectedDateText = document.getElementById("selectedDateText");

    const sideSub = document.getElementById("sideSub");

    const storageNote = document.getElementById("storageNote");
    const viewModeBtn = document.getElementById("viewModeBtn");

    const settingsProfilePanel = document.getElementById("settingsProfilePanel");
    const settingsAccountPanel = document.getElementById("settingsAccountPanel");
    const profileName = document.getElementById("profileName");
    const profileFile = document.getElementById("profileFile");
    const profilePreview = document.getElementById("profilePreview");

    const accountNewEmail = document.getElementById("accountNewEmail");

    function setAuthMode(mode) {
        authMode = mode;
        const loginActive = mode === "login";
        tabLogin.classList.toggle("active", loginActive);
        tabRegister.classList.toggle("active", !loginActive);
        confirmField.style.display = loginActive ? "none" : "block";
        authGo.textContent = loginActive ? "Login" : "Register";

        setAuthMode("login");

        settingsProfilePanel.classList.toggle("active", profileActive);

    function openSettings() {
        if (!session) return;
        profileName.value = session.name || "";
        profileImageData = session.photoURL || "";
        profilePreview.src = profilePhotoOrDefault(session);
        accountCurrentEmail.value = session.email || "";
        accountNewEmail.value = "";
        accountCurrentPassword.value = "";
        accountNewPassword.value = "";
        accountNewPassword2.value = "";
        setSettingsTab("profile");
        settingsBackdrop.style.display = "flex";
    }

    function closeSettings() {
        settingsBackdrop.style.display = "none";
    }

    function renderTop() {
        if (!session) {
            whoLine.textContent = "Login required";
            topAvatar.style.display = "none";
            rolePill.style.display = "none";
            btnSettings.style.display = "none";
            btnLogin.style.display = "inline-block";
            btnLogout.style.display = "none";
            addEventBtn.style.display = "none";
            addAvailBtn.style.display = "none";
            resetBtn.style.display = "none";
            viewModeBtn.style.display = "none";
            clearAllBtn.style.display = "none";
            sideSub.textContent = "Log in to view and manage the calendar";
            return;
        }

        whoLine.textContent = `Logged in as ${session.name}`;

        topAvatar.style.display = "block";

        rolePill.innerHTML = `Role: <b>${escapeHTML(session.role.toUpperCase())}</b>`;

        resetBtn.style.display = (session.role === "admin") ? "inline-block" : "none";
        addEventBtn.style.display = (session.role === "admin" && !viewMode) ? "inline-block" : "none";
        addAvailBtn.style.display = (session.role === "admin" && !viewMode) ? "inline-block" : "none";

        sideSub.textContent = viewMode
            ? "View mode: no edit popup"
            : (session.role === "admin"
                ? "Admin: manage events, availability, and all picks"
                : "Staff: view dates and pick yourself as host");
    }

    function renderHostPicker() {
        const show = !!session && !!selectedDate && !viewMode && hosts.length > 0;
        pfpPickerBox.style.display = show ? "block" : "none";
        if (!show) return;

        pfpGrid.innerHTML = "";

        hosts.forEach(host => {
            const btn = document.createElement("div");
            btn.className = "pfpBtn";
            if (isPicked(selectedDate, host.uid)) btn.classList.add("active");

            const allowed = canClickHost(host);
            btn.setAttribute("aria-disabled", allowed ? "false" : "true");

            btn.innerHTML = `
                <img class="pfpImg" src="${escapeHTML(profilePhotoOrDefault(host))}" alt="${escapeHTML(host.name)}" />
                <div class="pfpName">${escapeHTML(host.name)}</div>
            `;

            btn.addEventListener("click", async (e) => {
                e.stopPropagation();

                if (!allowed) {
                    toast("You can only pick your own profile");
                    return;
                }

                try {
                    if (isPicked(selectedDate, host.uid)) {
                        await removePick(selectedDate, host.uid);
                    } else {
                        await setPick(selectedDate, host);
                    }
                } catch (err) {
                    console.error(err);
                    toast("Could not update host pick");
                }
            });

            pfpGrid.appendChild(btn);
        });
    }

    function renderHostBar() {
        if (!selectedDate) {
            hostBar.style.display = "none";
            return;
        }

        hostBar.style.display = "flex";
        hostBarDate.textContent = prettyDate(selectedDate);

        const picks = picksForDate(selectedDate).slice().sort((a, b) => (a.hostName || "").localeCompare(b.hostName || ""));
        hostChips.innerHTML = "";

        if (!picks.length) {
            const empty = document.createElement("div");
            empty.className = "chip";
            empty.innerHTML = `<b style="color:rgba(238,241,246,.75)">No hosts picked yet</b>`;
            hostChips.appendChild(empty);
        } else {
            picks.forEach(p => {
                const chip = document.createElement("div");
                chip.className = "chip";
                chip.innerHTML = `
                    <img src="${escapeHTML(p.hostImg || defaultAvatarDataURL(p.hostName || "U"))}" alt="${escapeHTML(p.hostName || "Host")}" />
                    <b>${escapeHTML(p.hostName || "Host")}</b>
                `;
                hostChips.appendChild(chip);
            });
        }

        if (session) {
            clearMyPickBtn.style.display = isPicked(selectedDate, session.uid) ? "inline-flex" : "none";
        } else {
            clearMyPickBtn.style.display = "none";
        }
    }

    function renderCalendar() {
        monthTitle.textContent = monthLabel(viewDate);
        calGrid.innerHTML = "";

        const first = startOfMonth(viewDate);
        const lead = mondayIndex(first.getDay());
        const startCellDate = new Date(first);
        startCellDate.setDate(first.getDate() - lead);

        for (let i = 0; i < 42; i++) {
            const cellDate = new Date(startCellDate);
            cellDate.setDate(startCellDate.getDate() + i);
            const iso = toISODate(cellDate);
            const inMonth = cellDate.getMonth() === viewDate.getMonth();

            const dayEvents = events.filter(e => e.date === iso);
            const dayAvail = avail.filter(a => a.date === iso);
            const dayPicks = hostPicks.filter(p => p.date === iso);

            const div = document.createElement("div");
            div.className = "day" + (inMonth ? "" : " muted");

            if (selectedDate === iso) {
                div.style.borderColor = "rgba(114,137,218,.65)";
                div.style.background = "rgba(114,137,218,.10)";
            }

            const head = document.createElement("div");
            head.className = "dayHead";

            const num = document.createElement("div");
            num.className = "dayNum";
            num.textContent = String(cellDate.getDate());

            const badge = document.createElement("div");
            const parts = [];
            if (dayEvents.length) parts.push("E " + dayEvents.length);
            if (dayAvail.length) parts.push("A " + dayAvail.length);
            if (dayPicks.length) parts.push("H " + dayPicks.length);
            badge.className = "badge" + (dayEvents.length ? " brand" : ((dayAvail.length || dayPicks.length) ? " ok" : ""));
            badge.textContent = parts.length ? parts.join(" ") : "";

            head.appendChild(num);
            head.appendChild(badge);

            const list = document.createElement("div");
            list.className = "miniList";

            dayEvents.slice(0, 2).forEach(ev => {
                const it = document.createElement("div");
                it.className = "miniItem";
                it.textContent = ev.host ? `${ev.title} - ${ev.host}` : ev.title;
                list.appendChild(it);
            });

            if (dayPicks.length) {
                const it = document.createElement("div");
                it.className = "miniItem";
                const icons = dayPicks.slice(0, 3).map(p =>
                    `<img src="${escapeHTML(p.hostImg || defaultAvatarDataURL(p.hostName || "U"))}"
                          title="${escapeHTML(p.hostName || "Host")}"
                          style="width:20px;height:20px;border-radius:50%;border:1px solid rgba(255,255,255,.18);margin-right:-6px;vertical-align:middle;background:rgba(255,255,255,.06)">`
                ).join("");
                const extra = dayPicks.length > 3 ? ` <span>+${dayPicks.length - 3}</span>` : "";
                it.innerHTML = `<span>Hosts:</span> ${icons}${extra}`;
                list.appendChild(it);
            }

            if (dayEvents.length > 2) {
                const it = document.createElement("div");
                it.className = "miniItem";
                it.innerHTML = `<span>+${dayEvents.length - 2} more</span>`;
                list.appendChild(it);
            }

            div.appendChild(head);
            div.appendChild(list);

            div.addEventListener("click", () => {
                selectedDate = iso;
                renderCalendar();
                renderDetails();
                renderHostPicker();
                renderHostBar();

                if (viewMode) return;

                if (!session) {
                    pendingOpenDate = iso;
                    openAuth();
                    return;
                }

                if (session.role !== "admin") return;

                openDayModal(iso);
            });

            calGrid.appendChild(div);
        }
    }

    function renderDetails() {
        selectedDateText.textContent = selectedDate ? prettyDate(selectedDate) : "None";
        detailList.innerHTML = "";
        renderHostBar();
        renderHostPicker();

        if (!session) {
            detailList.innerHTML = `
                <div class="emptyState">
                    <b>Login required</b>
                    <p style="margin:8px 0 0;color:var(--muted);font-size:12px;">Create an account or log in to use the calendar.</p>
                </div>
            `;
            return;
        }

        if (!selectedDate) {
            detailList.innerHTML = `
                <div class="emptyState">
                    <b>Pick a date</b>
                    <p style="margin:8px 0 0;color:var(--muted);font-size:12px;">Tap or click a day to view events and host picks.</p>
                </div>
            `;
            return;
        }

        const dayEvents = events.filter(e => e.date === selectedDate);
        const dayAvail = avail.filter(a => a.date === selectedDate);
        const dayPicks = picksForDate(selectedDate);

        const picksCard = document.createElement("div");
        picksCard.className = "item";

        const picksLeft = document.createElement("div");
        picksLeft.style.flex = "1";
        picksLeft.innerHTML = `<h4>Picked hosts (${dayPicks.length})</h4>`;

        if (!dayPicks.length) {
            const p = document.createElement("p");
            p.textContent = "No host picks yet.";
            picksLeft.appendChild(p);
        } else {
            dayPicks.forEach(pick => {
                const row = document.createElement("div");
                row.className = "pickEntry";
                row.innerHTML = `
                    <div class="pickEntryLeft">
                        <img src="${escapeHTML(pick.hostImg || defaultAvatarDataURL(pick.hostName || "U"))}" alt="${escapeHTML(pick.hostName || "Host")}">
                        <div>
                            <div class="pickEntryName">${escapeHTML(pick.hostName || "Host")}</div>
                            <div class="pickEntryMeta">Email hidden for privacy</div>
                        </div>
                    </div>
                `;

                const actions = document.createElement("div");
                actions.className = "row";

                const isMine = session && pick.hostUid === session.uid;

                if (!viewMode && (session.role === "admin" || isMine)) {
                    const removeBtn = document.createElement("button");
                    removeBtn.className = "btn small danger";
                    removeBtn.textContent = session.role === "admin" && !isMine ? "Remove pick" : "Remove";
                    removeBtn.onclick = async () => {
                        try {
                            await removePick(selectedDate, pick.hostUid);
                            toast("Pick removed");
                        } catch (err) {
                            console.error(err);
                            toast("Could not remove pick");
                        }
                    };
                    actions.appendChild(removeBtn);
                }

                row.appendChild(actions);
                picksLeft.appendChild(row);
            });
        }

        const picksRight = document.createElement("div");
        picksRight.className = "row";
        picksRight.innerHTML = `<div class="badge ok">Host picks</div>`;

        if (!viewMode && session.role === "admin" && dayPicks.length) {
            const clearBtn = document.createElement("button");
            clearBtn.className = "btn small danger";
            clearBtn.textContent = "Clear date picks";
            clearBtn.onclick = async () => {
                const ok = confirm("Remove all host picks for this date?");
                if (!ok) return;
                try {
                    await clearPicksForDate(selectedDate);
                    toast("Cleared picks");
                } catch (err) {
                    console.error(err);
                    toast("Could not clear picks");
                }
            };
            picksRight.appendChild(clearBtn);
        }

        picksCard.appendChild(picksLeft);
        picksCard.appendChild(picksRight);
        detailList.appendChild(picksCard);

        const evCard = document.createElement("div");
        evCard.className = "item";
        const evLeft = document.createElement("div");
        evLeft.style.flex = "1";
        evLeft.innerHTML = `<h4>Official events (${dayEvents.length})</h4>`;

        if (!dayEvents.length) {
            const p = document.createElement("p");
            p.textContent = "No official events on this day yet.";
            evLeft.appendChild(p);
        } else {
            dayEvents.slice().sort((a, b) => (a.time || "").localeCompare(b.time || "")).forEach(ev => {
                const wrap = document.createElement("div");
                wrap.style.marginTop = "10px";
                wrap.style.padding = "10px";
                wrap.style.borderRadius = "12px";
                wrap.style.border = "1px solid rgba(255,255,255,.10)";
                wrap.style.background = "rgba(0,0,0,.16)";

                const hostLine = ev.host ? `Host: ${ev.host}` : "Host: Unassigned";

                wrap.innerHTML = `
                    <b>${escapeHTML(ev.title)}</b>
                    <div class="meta">${escapeHTML(ev.time || "Time TBA")} • ${escapeHTML(ev.location || "Location TBA")} • ${escapeHTML(hostLine)}</div>
                    ${ev.note ? `<p style="margin:8px 0 0;font-size:12px;color:var(--muted)">${escapeHTML(ev.note)}</p>` : ""}
                `;

                if (!viewMode && session.role === "admin") {
                    const controls = document.createElement("div");
                    controls.style.marginTop = "10px";
                    controls.style.display = "flex";
                    controls.style.gap = "8px";
                    controls.style.flexWrap = "wrap";

                    const setHostBtn = document.createElement("button");
                    setHostBtn.className = "btn small primary";
                    setHostBtn.textContent = "Set host";
                    setHostBtn.onclick = async () => {
                        const name = prompt("Host name:", ev.host || "");
                        if (name === null) return;
                        await upsertEvent({ ...ev, host: name.trim() });
                        toast("Host updated");
                    };

                    const delBtn = document.createElement("button");
                    delBtn.className = "btn small danger";
                    delBtn.textContent = "Remove";
                    delBtn.onclick = async () => {
                        await removeEvent(ev.id);
                        toast("Event removed");
                    };

                    controls.appendChild(setHostBtn);
                    controls.appendChild(delBtn);
                    wrap.appendChild(controls);
                }

                evLeft.appendChild(wrap);
            });
        }

        const evRight = document.createElement("div");
        evRight.innerHTML = (session.role === "admin") ? '<div class="badge brand">Admin</div>' : '<div class="badge">Staff</div>';

        evCard.appendChild(evLeft);
        evCard.appendChild(evRight);
        detailList.appendChild(evCard);

        const avCard = document.createElement("div");
        avCard.className = "item";
        const avLeft = document.createElement("div");
        avLeft.style.flex = "1";
        avLeft.innerHTML = `<h4>Staff availability (${dayAvail.length})</h4>`;

        if (!dayAvail.length) {
            const p = document.createElement("p");
            p.textContent = "No availability added yet.";
            avLeft.appendChild(p);
        } else {
            dayAvail.forEach(a => {
                const line = document.createElement("div");
                line.style.marginTop = "10px";
                line.style.padding = "10px";
                line.style.borderRadius = "12px";
                line.style.border = "1px solid rgba(255,255,255,.10)";
                line.style.background = "rgba(0,0,0,.16)";
                line.innerHTML = `
                    <b class="okText">${escapeHTML(a.name)}</b>
                    <div class="meta">${escapeHTML(a.note || "Available to host")}</div>
                `;

                if (!viewMode && session.role === "admin") {
                    const del = document.createElement("button");
                    del.className = "btn small danger";
                    del.textContent = "Remove";
                    del.style.marginTop = "10px";
                    del.onclick = async () => {
                        await removeAvail(a.id);
                        toast("Availability removed");
                    };
                    line.appendChild(del);
                }

                avLeft.appendChild(line);
            });
        }

        const avRight = document.createElement("div");
        avRight.innerHTML = '<div class="badge warn">Availability</div>';
        avCard.appendChild(avLeft);
        avCard.appendChild(avRight);
        detailList.appendChild(avCard);
    }

    function openDayModal(iso) {
        if (!session || viewMode || session.role !== "admin") return;

        dayBackdrop.style.display = "flex";
        dayModalTitle.textContent = prettyDate(iso);
        dayModalSub.textContent = "Admin: add an official event or add staff availability.";

        dayModalBody.innerHTML = `
            <div class="row" style="justify-content:space-between;align-items:center;margin-bottom:10px">
                <div class="pill">Selected: <b>${escapeHTML(iso)}</b></div>
                <button class="btn" id="closeDayModal" type="button">Close</button>
            </div>

            <div class="kv">
                <div class="t">Add official event</div>
                <div style="height:10px"></div>
                <div class="field"><label>Event title</label><input id="evTitle" placeholder="e.g. Time Trial" maxlength="50"></div>
                <div class="row">
                    <div class="field" style="flex:1;min-width:160px"><label>Time (optional)</label><input id="evTime" placeholder="e.g. 6:00PM AEST" maxlength="30"></div>
                    <div class="field" style="flex:1;min-width:160px"><label>Location (optional)</label><input id="evLoc" placeholder="e.g. Spider cave" maxlength="40"></div>
                </div>
                <div class="field"><label>Host (optional)</label><input id="evHost" placeholder="e.g. Nugg" maxlength="24"></div>
                <div class="field"><label>Notes (optional)</label><textarea id="evNote" placeholder="Extra details..."></textarea></div>
                <button class="btn ok" id="saveEvent" type="button">Add event</button>
            </div>

            <div class="divider"></div>

            <div class="kv">
                <div class="t">Add availability</div>
                <div style="height:10px"></div>
                <div class="field"><label>Name</label><input id="avName" placeholder="e.g. Nugg" maxlength="24"></div>
                <div class="field"><label>Note (optional)</label><input id="avNote" placeholder="e.g. Can host after 5pm" maxlength="60"></div>
                <button class="btn primary" id="saveAvail" type="button">Add availability</button>
            </div>
        `;

        document.getElementById("closeDayModal").onclick = () => {
            dayBackdrop.style.display = "none";
        };

        document.getElementById("saveEvent").onclick = async () => {
            const title = (document.getElementById("evTitle").value || "").trim();
            const time = (document.getElementById("evTime").value || "").trim();
            const loc = (document.getElementById("evLoc").value || "").trim();
            const host = (document.getElementById("evHost").value || "").trim();
            const note = (document.getElementById("evNote").value || "").trim();

            if (!title) {
                toast("Event title required");
                return;
            }

            await upsertEvent({
                id: uid(),
                date: iso,
                title,
                time,
                location: loc,
                host,
                note
            });

            toast("Event added");
            dayBackdrop.style.display = "none";
        };

        document.getElementById("saveAvail").onclick = async () => {
            const name = (document.getElementById("avName").value || "").trim();
            const note = (document.getElementById("avNote").value || "").trim();

            if (!name) {
                toast("Name required");
                return;
            }

            await upsertAvail({
                id: uid(),
                date: iso,
                name,
                note
            });

            toast("Availability added");
            dayBackdrop.style.display = "none";
        };
    }

    function clearListeners() {
        unsubscribers.forEach(fn => {
            try { fn(); } catch {}
        });
        unsubscribers = [];
    }

    function startListeners() {
        clearListeners();
        storageNote.textContent = "Syncing with Firebase...";

        unsubscribers.push(onSnapshot(collection(db, "users"), (snap) => {
            usersMap.clear();
            hosts = snap.docs.map(d => {
                const data = d.data();
                const user = {
                    uid: d.id,
                    name: data.name || "User",
                    email: data.email || "",
                    role: data.role || "staff",
                    photoURL: data.photoURL || ""
                };
                usersMap.set(d.id, user);
                return user;
            }).sort((a, b) => a.name.localeCompare(b.name));

            if (session && usersMap.has(session.uid)) {
                const fresh = usersMap.get(session.uid);
                session = { ...session, ...fresh };
                renderTop();
            }

            renderHostPicker();
            renderDetails();
        }));

        unsubscribers.push(onSnapshot(collection(db, "events"), (snap) => {
            events = snap.docs.map(d => d.data());
            saveJSON(KEY_EVENTS, events);
            renderCalendar();
            renderDetails();
            storageNote.textContent = "Synced with Firebase";
        }));

        unsubscribers.push(onSnapshot(collection(db, "availability"), (snap) => {
            avail = snap.docs.map(d => d.data());
            saveJSON(KEY_AVAIL, avail);
            renderCalendar();
            renderDetails();
        }));

        unsubscribers.push(onSnapshot(collection(db, "host_picks"), (snap) => {
            hostPicks = snap.docs.map(d => d.data());
            saveJSON(KEY_PICKS, hostPicks);
            renderCalendar();
            renderDetails();
            renderHostPicker();
            renderHostBar();
        }));
    }

    btnLogin.addEventListener("click", openAuth);

    btnLogout.addEventListener("click", async () => {
        try {
            await signOut(auth);
            toast("Logged out");
        } catch (err) {
            console.error(err);
            toast("Logout failed");
        }
    });

    btnSettings.addEventListener("click", openSettings);

    tabLogin.addEventListener("click", () => setAuthMode("login"));
    tabRegister.addEventListener("click", () => setAuthMode("register"));
    document.getElementById("authClose").addEventListener("click", closeAuth);

    authGo.addEventListener("click", async () => {
        const email = (authEmail.value || "").trim();
        const password = authPassword.value || "";
        const password2 = authPassword2.value || "";

        if (!email || !password) {
            toast("Enter email and password");
            return;
        }

        if (authMode === "register") {
            if (password.length < 6) {
                toast("Password must be at least 6 characters");
                return;
            }

            if (password !== password2) {
                toast("Passwords do not match");
                return;
            }

            try {
                await createUserWithEmailAndPassword(auth, email, password);
                closeAuth();
                toast("Account created");
            } catch (err) {
                console.error("REGISTER ERROR:", err);
                toast(err.code || err.message || "Could not register");
            }
            return;
        }

        try {
            await signInWithEmailAndPassword(auth, email, password);
            closeAuth();
            toast("Logged in");
        } catch (err) {
            console.error("LOGIN ERROR:", err);
            toast(err.code || err.message || "Login failed");
        }
    });

    settingsProfileTab.addEventListener("click", () => setSettingsTab("profile"));
    settingsAccountTab.addEventListener("click", () => setSettingsTab("account"));
    document.getElementById("settingsClose").addEventListener("click", closeSettings);

    profileFile.addEventListener("change", async () => {
        const file = profileFile.files?.[0];
        if (!file) return;

        try {
            profileImageData = await fileToAvatarDataURL(file);
            profilePreview.src = profileImageData;
        } catch (err) {
            console.error(err);
            toast("Could not read image");
        }
    });

    document.getElementById("removeProfilePic").addEventListener("click", () => {
        profileImageData = "";
        profileFile.value = "";
        profilePreview.src = defaultAvatarDataURL(profileName.value || session?.name || "User");
    });

    profileName.addEventListener("input", () => {
        if (!profileImageData) {
            profilePreview.src = defaultAvatarDataURL(profileName.value || "User");
        }
    });

    document.getElementById("saveProfileBtn").addEventListener("click", async () => {
        if (!session) return;

        const name = (profileName.value || "").trim();
        if (name.length < 2) {
            toast("Display name must be at least 2 characters");
            return;
        }

        try {
            const existing = await getDoc(doc(db, "users", session.uid));
            const current = existing.exists() ? existing.data() : {};
            await setDoc(doc(db, "users", session.uid), {
                name,
                email: session.email || current.email || "",
                role: current.role || "staff",
                photoURL: profileImageData || ""
            }, { merge: true });

            session = {
                ...session,
                name,
                photoURL: profileImageData || "",
                role: current.role || session.role || "staff"
            };

            topAvatar.src = profilePhotoOrDefault(session);
            renderTop();
            renderHostPicker();
            renderDetails();
            toast("Profile saved");
        } catch (err) {
            console.error(err);
            toast("Could not save profile");
        }
    });

    document.getElementById("saveAccountBtn").addEventListener("click", async () => {
        const user = auth.currentUser;
        if (!user || !session) return;

        const newEmail = (accountNewEmail.value || "").trim();
        const currentPassword = accountCurrentPassword.value || "";
        const newPassword = accountNewPassword.value || "";
        const newPassword2 = accountNewPassword2.value || "";

        if (!newEmail && !newPassword) {
            toast("No account changes entered");
            return;
        }

        if (!currentPassword) {
            toast("Enter your current password");
            return;
        }

        if (newPassword && newPassword.length < 6) {
            toast("New password must be at least 6 characters");
            return;
        }

        if (newPassword && newPassword !== newPassword2) {
            toast("New passwords do not match");
            return;
        }

        try {
            const credential = EmailAuthProvider.credential(user.email, currentPassword);
            await reauthenticateWithCredential(user, credential);

            if (newEmail) {
                await updateEmail(user, newEmail);
            }

            if (newPassword) {
                await updatePassword(user, newPassword);
            }

            await setDoc(doc(db, "users", session.uid), {
                email: newEmail || user.email || session.email || ""
            }, { merge: true });

            session.email = newEmail || user.email || session.email || "";
            accountCurrentEmail.value = session.email;
            accountNewEmail.value = "";
            accountCurrentPassword.value = "";
            accountNewPassword.value = "";
            accountNewPassword2.value = "";

            toast("Account updated");
        } catch (err) {
            console.error("ACCOUNT UPDATE ERROR:", err);
            toast(err.code || err.message || "Could not update account");
        }
    });

    clearMyPickBtn.addEventListener("click", async () => {
        if (!session || !selectedDate) return;

        try {
            await removePick(selectedDate, session.uid);
            toast("Removed your pick");
        } catch (err) {
            console.error(err);
            toast("Could not remove pick");
        }
    });

    document.getElementById("prevMonth").addEventListener("click", () => {
        viewDate = new Date(viewDate.getFullYear(), viewDate.getMonth() - 1, 1);
        renderCalendar();
    });

    document.getElementById("nextMonth").addEventListener("click", () => {
        viewDate = new Date(viewDate.getFullYear(), viewDate.getMonth() + 1, 1);
        renderCalendar();
    });

    document.getElementById("todayBtn").addEventListener("click", () => {
        viewDate = new Date();
        selectedDate = toISODate(new Date());
        renderCalendar();
        renderDetails();

        if (viewMode) return;

        if (!session) {
            pendingOpenDate = selectedDate;
            openAuth();
            return;
        }

        if (session.role === "admin") {
            openDayModal(selectedDate);
        }
    });

    addEventBtn.addEventListener("click", () => {
        if (viewMode) return;
        if (!session) {
            pendingOpenDate = selectedDate || toISODate(new Date());
            openAuth();
            return;
        }
        if (session.role !== "admin") return;
        if (!selectedDate) selectedDate = toISODate(new Date());
        openDayModal(selectedDate);
    });

    addAvailBtn.addEventListener("click", () => {
        if (viewMode) return;
        if (!session) {
            pendingOpenDate = selectedDate || toISODate(new Date());
            openAuth();
            return;
        }
        if (session.role !== "admin") return;
        if (!selectedDate) selectedDate = toISODate(new Date());
        openDayModal(selectedDate);
    });

    viewModeBtn.addEventListener("click", () => {
        viewMode = !viewMode;
        saveJSON(KEY_VIEWMODE, viewMode);
        toast("View mode " + (viewMode ? "ON" : "OFF"));
        renderTop();
        renderCalendar();
        renderDetails();
    });

    clearAllBtn.addEventListener("click", async () => {
        if (!session || session.role !== "admin") return;

        const ok = confirm(
            "CLEAR ALL?\n\nThis deletes:\n- All Events\n- All Availability\n- All Host Picks\n\nThis cannot be undone."
        );
        if (!ok) return;

        try {
            const [evSnap, avSnap, pkSnap] = await Promise.all([
                getDocs(collection(db, "events")),
                getDocs(collection(db, "availability")),
                getDocs(collection(db, "host_picks"))
            ]);

            const deletes = [];
            evSnap.forEach(d => deletes.push(deleteDoc(doc(db, "events", d.id))));
            avSnap.forEach(d => deletes.push(deleteDoc(doc(db, "availability", d.id))));
            pkSnap.forEach(d => deletes.push(deleteDoc(doc(db, "host_picks", d.id))));
            await Promise.all(deletes);

            toast("Cleared everything");
        } catch (err) {
            console.error(err);
            toast("Clear failed");
        }
    });

    resetBtn.addEventListener("click", () => {
        if (!session || session.role !== "admin") return;
        saveJSON(KEY_EVENTS, []);
        saveJSON(KEY_AVAIL, []);
        saveJSON(KEY_PICKS, []);
        toast("Local cache cleared");
    });

    authBackdrop.addEventListener("click", (e) => {
        if (e.target === authBackdrop) closeAuth();
    });

    settingsBackdrop.addEventListener("click", (e) => {
        if (e.target === settingsBackdrop) closeSettings();
    });

    dayBackdrop.addEventListener("click", (e) => {
        if (e.target === dayBackdrop) dayBackdrop.style.display = "none";
    });

    onAuthStateChanged(auth, async (firebaseUser) => {
        try {
            if (!firebaseUser) {
                session = null;
                renderTop();
                renderCalendar();
                renderDetails();
                return;
            }

            await loadSessionFromAuth(firebaseUser);
            renderTop();
            renderCalendar();
            renderDetails();
            startListeners();

            if (pendingOpenDate && session?.role === "admin" && !viewMode) {
                const dateToOpen = pendingOpenDate;
                pendingOpenDate = null;
                selectedDate = dateToOpen;
                renderCalendar();
                renderDetails();
                openDayModal(dateToOpen);
            } else {
                pendingOpenDate = null;
            }
        } catch (err) {
            console.error(err);
            toast("Could not load account");
        }
    });

    function boot() {
        selectedDate = toISODate(new Date());
        renderTop();
        renderCalendar();
        renderDetails();
        startListeners();
    }

    boot();
</script>
